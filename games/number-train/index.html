<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Train</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <a class="back" href="../../">Back to Games Hub</a>
    <h1>Number Train</h1>
    <p>Find the missing number to keep the train moving.</p>
    <section class="controls">
      <label>
        Age Level
        <select id="difficulty">
          <option value="easy">3-4</option>
          <option value="medium" selected>5-6</option>
          <option value="hard">7</option>
        </select>
      </label>
      <button id="sound-toggle" type="button">Sound: On</button>
      <button id="music-toggle" type="button">Music: Off</button>
      <p class="best">Best: <span id="best-score">0</span></p>
    </section>
    <h2 id="question"></h2>
    <div id="choices" class="choices"></div>
    <p id="status"></p>
    <p>Score: <span id="score">0</span></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
